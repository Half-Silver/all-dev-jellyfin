app:
  name: all-dev-jellyfin
  version: "1.0.0"

# Sidecar mode.
#
# Jellyfin runs its own snapd-managed daemon (the `jellyfin` app defined in
# snapcraft.yaml, which execs the jellyfin server and serves its web UI / API
# over HTTP on port 8096). The CT engine does NOT launch or manage that daemon
# — it runs as a lightweight reporting sidecar that validates/persists the
# config Control Tower pushes via `snap set` and streams status callbacks back
# to CT.
run:
  command: ""

# Status reported on the initial and periodic callbacks. The jellyfin server
# listens on port 8096 over HTTP by default (see the `jellyfin` app in
# snapcraft.yaml).
#
# The status_command also enforces the demo media cap as a soft (monitored)
# limit: the library lives at $SNAP_COMMON/media (created by the configure
# hook), so each callback measures its size with `du` and reports usage
# against the 15GiB demo cap, appending a WARNING once the cap is reached.
# CT sees this in the periodic "message" callbacks. Constraints from the
# engine's minimal YAML parser (ct_engine.py):
#   - one line only (no block scalars);
#   - left BARE/unquoted — parse_yaml_value strips outer quotes but does NOT
#     unescape, so inner double quotes must be real, not \"-escaped;
#   - no ${...} or {word} forms — interpolate() would treat {word} as a config
#     key. Hence $var (not ${var}) and $((..)) arithmetic only.
sidecar:
  status_command: ip=$(hostname -I | awk '{print $1}'); cap=16106127360; used=$(du -sb "$SNAP_COMMON/media" 2>/dev/null | cut -f1); [ -n "$used" ] || used=0; umib=$((used/1048576)); pct=$((used*100/cap)); msg="Jellyfin: http://$ip:8096 | media $umib MiB / 15360 MiB demo cap ($pct%)"; [ "$used" -ge "$cap" ] && msg="$msg [WARNING: 15GiB demo cap reached]"; echo "$msg"

output:
  mode: logs
  interval: 60
  initial_event: "message_initial"
  periodic_event: "message"
  stop_event: "deployment_stop"

# Configuration schema — intentionally empty.
#
# Jellyfin is configured through its own web UI / config dir (under
# $SNAP_DATA), so the snap exposes no app settings for Control Tower to push
# via `snap set`. Only the automatic ct-* keys (handled by the engine itself,
# all lowercase/hyphen) are used.
config: {}
